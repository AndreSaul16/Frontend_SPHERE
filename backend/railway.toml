[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Sin startCommand: Railway NO expande ${PORT} en startCommand (lo ejecuta sin shell),
# así que uvicorn no arrancaba y el deploy fallaba. El CMD del Dockerfile (shell form,
# --port ${PORT:-8000}) sí expande la variable correctamente. Ver bde069a (funcionaba sin railway.toml).
healthcheckPath = "/api/v1/health/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
