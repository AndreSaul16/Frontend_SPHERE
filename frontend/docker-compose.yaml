# SPHERE Frontend — Docker Compose (Desarrollo Local)
# Usar: docker compose up -d

services:
  # ─── Frontend ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sphere-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
