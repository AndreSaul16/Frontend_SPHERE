name: sphere-project

services:
  # 🐍 Lógica de Negocio (FastAPI)
  backend:
    build: ./backend
    container_name: sphere-backend
    ports:
      - "8000:8000"
    env_file:             
      - .env              
    environment:
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
    networks:
      - sphere-network


  # 🧠 Motor de IA (vLLM - Simulado por ahora)
  ml_inference:
    build: ./ml_inference
    container_name: sphere-ml
    ports:
      - "8001:8000"
    networks:
      - sphere-network
    # En Fase 1, usaremos CPU para probar, luego activaremos GPU
    environment: 
      - USE_CPU=true 

  # ⚛️ Interfaz de Usuario (React)
  frontend:
    build: 
      context: ./frontend
    container_name: sphere-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    networks:
      - sphere-network
    depends_on:
      - backend

# 🌐 Red Bridge Personalizada (Crítico para DNS interno)
networks:
  sphere-network:
    driver: bridge

# 📦 Volúmenes nombrados para preservar node_modules
volumes:
  frontend_node_modules:
