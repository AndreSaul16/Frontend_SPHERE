name: sphere-project

services:
  # 🐍 Lógica de Negocio (FastAPI)
  backend:
    build: ./backend
    container_name: sphere-backend
    ports:
      - "8000:8000"
    env_file:             #
      - .env              #
    environment:
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
    networks:
      - sphere-network
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

  # 🧠 Motor de IA (vLLM - Simulado por ahora)
  ml_inference:
    build: ./ml_inference
    container_name: sphere-ml
    ports:
      - "8001:8000"
    networks:
      - sphere-network
    # En Fase 1, usaremos CPU para probar, luego activaremos GPU
    environment: 
      - USE_CPU=true 

  # ⚛️ Interfaz de Usuario (React)
  frontend:
    build: ./frontend
    container_name: sphere-frontend
    ports:
      - "3000:3000"
    networks:
      - sphere-network
    depends_on:
      - backend

# 🌐 Red Bridge Personalizada (Crítico para DNS interno)
networks:
  sphere-network:
    driver: bridge
