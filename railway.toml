# n8n workflow automation service
# Deploy this service via Railway dashboard using the n8nio/n8n:latest Docker image.
#
# Required environment variables (set in Railway dashboard):
#   N8N_HOST          — public hostname for the n8n instance
#   N8N_PORT=5678     — port n8n listens on (default 5678)
#   N8N_PROTOCOL=https — protocol for webhook URLs
#   WEBHOOK_URL       — public URL for webhook callbacks
#   DB_TYPE=sqlite    — database backend (sqlite for zero-config)

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.n8n"

[deploy]
healthcheckPath = "/healthz"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Persist n8n workflow data across container restarts
[deploy.volume]
mountPath = "/home/node/.n8n"
