# CI — Frontend_SPHERE
# Non-required check: vitest + tsc + eslint. Scoped to frontend/ changes.
# Railway does NOT wait for this — no SKIPPED risk.
# Trigger: push to main (frontend/ only) + manual workflow_dispatch.

name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: frontend

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Unit tests
        run: npx vitest run
