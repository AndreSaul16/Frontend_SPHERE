# CI — Backend_SHPERE
# Non-required check: unit tests only. Scoped to backend/ changes.
# Railway does NOT wait for this — no SKIPPED risk.
# Trigger: push to main (backend/ only) + manual workflow_dispatch.

name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
        run: python -m pytest tests/ -x --ignore=tests/integration -v
