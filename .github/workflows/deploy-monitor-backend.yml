# Deploy Monitor — Backend_SHPERE
# Polls Railway GraphQL after every push to main to verify deploy success.
# Sets GitHub commit status (pending → success/failure/error).
# Auto-creates GitHub Issue on failure with error context.
# Scoped to backend/ changes to avoid cross-service noise.
#
# Required secrets:
#   RAILWAY_API_TOKEN — Railway API token with GraphQL access

name: Deploy Monitor (Backend)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  RAILWAY_API: https://backboard.railway.app/graphql/v2
  SERVICE_NAME: Backend_SHPERE
  MAX_ATTEMPTS: 12
  POLL_INTERVAL: 25

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set commit status to pending
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=pending \
            -f description="Deploy en progreso…" \
            -f context="deploy/${{ env.SERVICE_NAME }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Poll Railway deploy status
        id: poll
        run: |
          TOKEN="${{ secrets.RAILWAY_API_TOKEN }}"

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "::group::Attempt $attempt/$MAX_ATTEMPTS — polling Railway…"

            DEPLOY_QUERY='{"query":"{ deployments(first:1, input:{}) { edges { node { id status meta } } } }"}'
            RESPONSE=$(curl -s -X POST "$RAILWAY_API" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$DEPLOY_QUERY" 2>&1) || true

            echo "Response: ${RESPONSE:0:500}"

            if command -v jq &>/dev/null; then
              STATUS=$(echo "$RESPONSE" | jq -r '.data.deployments.edges[0].node.status // "UNKNOWN"')
            else
              STATUS="UNKNOWN"
            fi

            echo "Deploy status: $STATUS"

            case "$STATUS" in
              SUCCESS)
                echo "::notice::Deploy SUCCESS after $attempt attempt(s)"
                echo "result=success" >> $GITHUB_OUTPUT
                echo "::endgroup::"
                exit 0
                ;;
              FAILED|CRASHED|SKIPPED|REMOVED)
                echo "::error::Deploy $STATUS"
                echo "result=failure" >> $GITHUB_OUTPUT
                echo "status=$STATUS" >> $GITHUB_OUTPUT
                echo "::endgroup::"
                exit 0
                ;;
              *)
                echo "Still deploying… waiting ${POLL_INTERVAL}s"
                ;;
            esac

            echo "::endgroup::"

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              sleep $POLL_INTERVAL
            fi
          done

          echo "::warning::Deploy monitor timed out after $MAX_ATTEMPTS attempts"
          echo "result=timeout" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set commit status (success)
        if: steps.poll.outputs.result == 'success'
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=success \
            -f description="Deploy OK — ${{ env.SERVICE_NAME }}" \
            -f context="deploy/${{ env.SERVICE_NAME }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set commit status (failure)
        if: steps.poll.outputs.result == 'failure'
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=failure \
            -f description="Deploy ${{ steps.poll.outputs.status }} — ${{ env.SERVICE_NAME }}" \
            -f context="deploy/${{ env.SERVICE_NAME }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set commit status (timeout)
        if: steps.poll.outputs.result == 'timeout'
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=error \
            -f description="Railway API unreachable — ${{ env.SERVICE_NAME }}" \
            -f context="deploy/${{ env.SERVICE_NAME }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create issue on failure
        if: steps.poll.outputs.result == 'failure'
        run: |
          TITLE="Deploy ${{ steps.poll.outputs.status }}: ${{ env.SERVICE_NAME }} — ${{ github.sha }}"
          BODY="## Deploy Failure

          **Service**: ${{ env.SERVICE_NAME }}
          **Commit**: ${{ github.sha }}
          **Status**: ${{ steps.poll.outputs.status }}
          **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          The deploy monitor detected a **${{ steps.poll.outputs.status }}** deployment.

          Check [Railway Dashboard](https://railway.app) for build logs."

          EXISTING=$(gh issue list -s open -l "deploy-failure" -l "${{ env.SERVICE_NAME }}" --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open — skipping creation"
          else
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "deploy-failure,${{ env.SERVICE_NAME }}" \
              --assignee "${{ github.actor }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
